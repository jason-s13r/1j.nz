<!DOCTYPE html>
<html lang="{{ $.Site.LanguageCode }}">

    <body a="{{ $.Site.Params.theme_config.appearance | default "auto" }}">
        {{- partial "heading.html" . -}}
        <main class="page-content" aria-label="Content">
            {{- block "main" . }}{{- end }}
            {{ partial "footer.html" }}
        </main>
    </body>
</html>
